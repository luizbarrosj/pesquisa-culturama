<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <p>Bem-vindo à nossa pesquisa online!</p>
        <form action="" method="get">
            <!-- Dados Pessoais: -->
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="username">Nome:</label>
                <input type="text" name="username" placeholder="Digite seu nome" required>
                <br>
                <label for="age">Idade:</label>
                <input type="number" name="age" placeholder="Digite sua idade" min="12" max="100" required>
                <br>
                <label for="birthdate">Data de Nascimento:</label>
                <input type="date" name="birthdate">
                <br>
                <label for="email">E-mail:</label>
                <input type="email" name="email" placeholder="Digite seu e-mail" required>
                <br>
                <label for="userPhoneNumber">Telefone:</label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}"
                    placeholder="Digite seu telefone (11 dígitos)">
                <br>
                <label for="userPhoto">Upload de Foto:</label>
                <input type="file" accept="image/*" name="userImage" id="userPhoto" required>
            </fieldset>
            <!-- Perfil -->
            <fieldset>
                <legend>Perfil</legend>
                <p>Gênero:</p>
                <input type="radio" name="userGender" id="userGender" value="Feminino">
                <label for="userGender">Feminino</label>
                <input type="radio" name="userGender" id="userGender" value="Masculino">
                <label for="userGender">Masculino</label>
                <input type="radio" name="userGender" id="userGender" value="notInformed">
                <label for="userGender">Prefiro não informar</label>
                <br>
                <br>
                <label for="maritalstatus">Estado Civil:</label>
                <select name="maritalstatus" id="maritalstatus">
                    <option value="">Selecione seu estado civil</option>
                    <option value="solteiro">Solteiro(a)</option>
                    <option value="casado">Casado(a)</option>
                    <option value="divorciado">Divorciado(a)</option>
                    <option value="viuvo">Viuvo(a)</option>
                </select>
                <br>
                <br>
                <label for="state">Estado:</label>
                <select name="state" id="state" required>
                    <option value="">Selecione seu estado</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
                <br>
                <br>
                <label for="city">Cidade:</label>
                <input type="text" name="city" placeholder="Digite sua cidade">
            </fieldset>
            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>
                <input type="checkbox" name="userSocial" id="userHabits" value="instagram">
                <label for="userHabits">Instagram</label>
                <input type="checkbox" name="userSocial" id="userHabits2" value="facebook">
                <label for="userHabits2">Facebook</label>
                <input type="checkbox" name="userSocial" id="userHabits3" value="twitter">
                <label for="userHabits3">Twitter</label>
                <br>
                <br>
                <label for="musicStyle">Estilo Musical Favorito:</label>
                <input type="text" list="musicStyles" name="musicStyle"
                    placeholder="Digite seu estilo musical favorito">
                <datalist id="musicStyles">
                    <option value="rock">Rock</option>
                    <option value="pop">Pop</option>
                    <option value="hiphop">Hip-Hop</option>
                    <option value="jazz">Jazz</option>
                    <option value="classical">Clássica</option>
                    <option value="electronic">Eletrônica</option>
                </datalist>
                <br>
                <input type="color" name="favoriteColor" id="favoriteColor" value="#000000">
                <label for="favoriteColor">Cor Favorita</label>
                <br>
                <br>
                <label for="userRating">Avaliação do Site:</label>
                <input type="radio" name="userRating" id="rating1" value="5">
                <label for="rating1">excelente</label>
                <input type="radio" name="userRating" id="rating2" value="4">
                <label for="rating2">bom</label>
                <input type="radio" name="userRating" id="rating3" value="3">
                <label for="rating3">regular</label>
                <input type="radio" name="userRating" id="rating4" value="2">
                <label for="rating4">ruim</label>
                <input type="radio" name="userRating" id="rating5" value="1">
                <label for="rating5">péssimo</label>
                <br>
                <br>
                <textarea name="userComments" id="userComments" cols="80" rows="5"
                    placeholder="Deixe seus comentários sobre o site"></textarea>
            </fieldset>
            <fieldset>
                <legend>Confirmações</legend>
                <input type="checkbox" name="userConsent" id="userLGDPTerm" value="consent" required>
                <label for="userLGDPTerm">Eu aceito Participar da pesquisa</label>
                <br>
                <input type="checkbox" name="userConsent" id="userLGDPTerm2" value="consent">
                <label for="userLGDPTerm2">Desejo receber informações sobre a pesquisa por email</label>
            </fieldset>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>

    </section>

</body>

</html>
