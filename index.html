<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>

<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <p>Bem-vindo à nossa pesquisa online!</p>
        <form action="" method="get">
            <!-- Dados Pessoais: -->
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="username">Nome:</label>
                <input type="text" name="username" placeholder="Digite seu nome" required>
                <br>
                <label for="age">Idade:</label>
                <input type="number" name="age" placeholder="Digite sua idade" min="12" max="100" required>
                <br>
                <label for="birthdate">Data de Nascimento:</label>
                <input type="date" name="birthdate">
                <br>
                <label for="email">E-mail:</label>
                <input type="email" name="email" placeholder="Digite seu e-mail" required>
                <br>
                <label for="userPhoneNumber">Telefone:</label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}"
                    placeholder="Digite seu telefone (11 dígitos)">
                <br>
                <label for="userPhoto">Upload de Foto:</label>
                <input type="file" accept="image/*" name="userImage" id="userPhoto" required>
            </fieldset>
            <button type="submit">Enviar</button>
        </form>

    </section>

</body>

</html>
